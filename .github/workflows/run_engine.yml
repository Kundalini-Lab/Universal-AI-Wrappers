name: Daily AI Asset Factory

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # ELEVATED PERMISSIONS: Forces GitHub to allow automated file pushing
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4
      with:
        persist-credentials: true # Keeps the access token active for the push step

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests

    - name: Run AI Automation Engine
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: python app.py

    - name: Automatically Commit and Push Changes to GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add .
        git commit -m "Automated update: Added new trending AI wrapper packages" || echo "No changes to commit"
        git push origin main
