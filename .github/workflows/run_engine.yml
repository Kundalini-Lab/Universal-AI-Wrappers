name: Daily AI Asset Factory

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Bypasses Node 20 deprecation prompts cleanly

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests

    - name: Run AI Automation Engine
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        cd $GITHUB_WORKSPACE
        python app.py

    - name: Automatically Commit and Push Changes to GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Adding a dynamic timestamp to guarantee a file change exists on every single execution run
        echo "# Last Automation Run: $(date)" >> RUN_LOG.md
        
        git add .
        
        # Direct structural bypass logic to completely prevent exit code 2 errors
        git diff-index --quiet HEAD || git commit -m "Automated update: Synchronized asset pipeline distribution packages"
        git push origin main
