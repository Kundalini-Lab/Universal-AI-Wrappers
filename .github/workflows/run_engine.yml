name: Daily AI Asset Factory

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests

    - name: Run AI Automation Engine
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: python app.py

    - name: Automatically Commit and Push Changes to GitHub
      run: |
        git config --global user.name "AI-Asset-Bot"
        git config --global user.email "bot@github.com"
        git add .
        git commit -m "Automated update: Added new trending AI wrapper packages" || exit 0
        git push
