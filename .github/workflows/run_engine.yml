name: Daily AI Asset Factory

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests

    - name: Run AI Automation Engine
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python app.py

    - name: Automatically Commit and Push Changes to GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        echo "# Last Automation Run: $(date)" >> RUN_LOG.md
        git add .
        
        # Safe bypass layout: Force pushes changes cleanly or exits gracefully if matching
        git commit -m "Automated update: Synchronized asset pipeline distribution packages" || exit 0
        git push
